<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIGO || Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
    <script src="../../js/auth.js?v=20260531" defer></script>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <img src="../../img/LogoMigo.jpeg" alt="MIGO Logo" class="login-logo">
        <h2>¡Bienvenido de nuevo!</h2>
        <p>Ingresa tus datos para acceder a tu cuenta</p>
    </div>

    <form class="login-form" id="login-form" novalidate>
        <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="Ingrese su correo electronico." required>
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="password-field">
                <input type="password" id="password" placeholder="Ingresa tu contraseña." minlength="8" required>
                <button type="button" class="password-toggle" data-password-toggle="password" aria-pressed="false"></button>
            </div>
        </div>

        <button type="submit" class="btn-login">Iniciar Sesión</button>
    </form>

    <div class="form-message" id="login-message" role="alert" aria-live="polite"></div>

    <div class="login-footer">
        <p>¿No tienes una cuenta? <a href="../ScreenCrearcuenta/crearcuenta.html">Regístrate aquí</a></p>
        <a href="../screenIndex/index.html" class="btn-back">Volver al inicio</a>
    </div>
</div>

</body>
</html>
