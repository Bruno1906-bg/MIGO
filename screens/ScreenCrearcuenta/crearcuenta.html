<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIGO || Crear Cuenta</title>
    <link rel="stylesheet" href="crearcuenta.css">
    <script src="../../js/auth.js?v=20260531" defer></script>
</head>
<body>

<div class="register-container">
    <div class="register-header">
        <img src="../../img/LogoMigo.jpeg" alt="MIGO Logo" class="register-logo">
        <h2>Crear Cuenta</h2>
        <p>Regístrate aqui!</p>
    </div>

    <form class="register-form" id="register-form" novalidate>
        <div class="form-grid">
            <div class="input-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre" required>
            </div>

            <div class="input-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" placeholder="Ingrese su apellido" required>
            </div>

            <div class="input-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" placeholder="Ingrese su numero de telefono">
            </div>

            <div class="input-group full-width">
                <label for="direccion">Dirección (Calle y Número)</label>
                <input type="text" id="direccion" placeholder="Ingrese su direccion">
            </div>

            <div class="input-group full-width">
                <label for="colonia">Colonia</label>
                <div class="colonia-search" data-colonia-search>
                    <input type="text" id="colonia" placeholder="Busca o escribe tu colonia" autocomplete="off" aria-autocomplete="list" aria-expanded="false" required>
                    <input type="hidden" id="id_colonia" name="id_colonia">
                    <div class="colonia-suggestions" id="colonia-suggestions" hidden></div>
                </div>
                <small class="field-hint">Escribe para ver las colonias disponibles.</small>
            </div>

            <div class="input-group full-width">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" placeholder="Ingrese su correo" autocomplete="email" required>
            </div>

            <div class="input-group full-width">
                <label for="contraseña">Contraseña</label>
                <div class="password-field">
                    <input type="password" id="contraseña" placeholder="8 caracteres" minlength="8" autocomplete="new-password" required>
                    <button type="button" class="password-toggle" data-password-toggle="contraseña" aria-pressed="false"></button>
                </div>
            </div>
        </div>
        <button type="submit" class="btn-register">Registrarse</button>
    </form>

    <div class="form-message" id="register-message" role="alert" aria-live="polite"></div>

    <div class="register-footer">
        <p>¿Ya tienes una cuenta? <a href="../ScreenLogin/login.html">Inicia sesión aquí</a></p>
        <a href="../screendIndex/index.html" class="btn-back">Volver al inicio</a>
    </div>
</div>

</body>
</html>
