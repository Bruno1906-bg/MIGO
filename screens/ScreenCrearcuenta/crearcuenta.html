<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIGO || Crear Cuenta</title>
    <link rel="stylesheet" href="crearcuenta.css">
</head>
<body>

<div class="register-container">
    <div class="register-header">
        <img src="/img/LogoMigo.jpeg" alt="MIGO Logo" class="register-logo">
        <h2>Crear Cuenta</h2>
        <p>Regístrate aqui!</p>
    </div>

    <form class="register-form">
        <div class="form-grid">
            <div class="input-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre." required>
            </div>

            <div class="input-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" placeholder="Ingrese su correo." required>
            </div>

            <div class="input-group">
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" placeholder="Su contraseña debe tener al menos 8 caracteres." required>
            </div>

            <div class="input-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" placeholder="Ingrese su numero de telefono.">
            </div>

            <div class="input-group full-width">
                <label for="direccion">Dirección (Calle y Número)</label>
                <input type="text" id="direccion" placeholder="Ingrese su direccion.">
            </div>

            <div class="input-group full-width">
                <label for="colonia">Colonia</label>
                <input type="text" id="colonia" placeholder="Ingrese el nombre de su colonia." required>
            </div>
        </div>
        <button type="submit" class="btn-register">Registrarse</button>
    </form>

    <div class="register-footer">
        <p>¿Ya tienes una cuenta? <a href="../ScreenLogin/login.html">Inicia sesión aquí</a></p>
        <a href="../screendIndex/index.html" class="btn-back">Volver al inicio</a>
    </div>
</div>

</body>
</html>
